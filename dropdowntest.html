<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Drop-down</title>
  <style>
    button {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    button::after {
      content: "▼"; /* Downward arrow */
    }
  </style>
</head>
<body>

<button>Dropdown</button>

</body>
</html>
